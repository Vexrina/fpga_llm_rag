syntax = "proto3";

package rag;

option go_package = "./rag";

// RAG сервис для работы с документами и поиском
service RagService {
  // Предпросмотр: извлечь текст из PDF/URL без сохранения
  rpc PreviewDocument(PreviewDocumentRequest) returns (PreviewDocumentResponse);
    
  // Сохранить документ с готовым текстом
  rpc CommitDocument(CommitDocumentRequest) returns (CommitDocumentResponse);
    
  // Поиск документов по запросу
  rpc SearchDocuments(SearchRequest) returns (SearchResponse);
    
  // Получить документ по ID
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse);
    
  // Удалить документ по ID
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
    
  // Получить статистику индекса
  rpc GetIndexStats(GetIndexStatsRequest) returns (GetIndexStatsResponse);

  // Получить все настройки RAG
  rpc GetRagSettings(GetRagSettingsRequest) returns (GetRagSettingsResponse);

  // Обновить настройку RAG
  rpc UpdateRagSettings(UpdateRagSettingsRequest) returns (UpdateRagSettingsResponse);

  // Получить историю изменений настроек
  rpc GetRagSettingsHistory(GetRagSettingsHistoryRequest) returns (GetRagSettingsHistoryResponse);
}

// Тип источника документа
enum DocumentSourceType {
  SOURCE_TYPE_UNSPECIFIED = 0;
  SOURCE_TYPE_TEXT = 1;
  SOURCE_TYPE_URL = 2;
  SOURCE_TYPE_PDF = 3;
}

// Запрос на добавление документа (legacy, для совместимости)
message AddDocumentRequest {
  string id = 1;
  string content = 2;
  string title = 3;
  repeated float embedding = 4;
  map<string, string> metadata = 5;
  DocumentSourceType source_type = 6;
  string source_url = 7;
  int32 url_max_depth = 8;
}

// Ответ на добавление документа
message AddDocumentResponse {
  bool success = 1;
  string message = 2;
}

// Запрос на предпросмотр (извлечение текста без сохранения)
message PreviewDocumentRequest {
  string title = 1;
  DocumentSourceType source_type = 2;
  string source_url = 3;
  string content_base64 = 4;  // PDF as base64
  int32 url_max_depth = 5;
}

// Ответ на предпросмотр
message PreviewDocumentResponse {
  string extracted_text = 1;
  int32 pages_extracted = 2;
}

// Запрос на коммит (сохранение отредактированного текста)
message CommitDocumentRequest {
  string title = 1;
  string content = 2;
  map<string, string> metadata = 3;
}

// Ответ на коммит
message CommitDocumentResponse {
  bool success = 1;
  string message = 2;
  string id = 3;
}

// Тип метода сравнения векторов
enum ComparisonMethod {
  COMPARISON_METHOD_UNSPECIFIED = 0;
  COMPARISON_METHOD_COSINE = 1;     // Косинусное сходство
  COMPARISON_METHOD_DOT = 2;        // Скалярное произведение
  COMPARISON_METHOD_EUCLIDEAN = 3;   // Евклидово расстояние
  COMPARISON_METHOD_L1 = 4;          // Манхэттенское расстояние (L1)
}

// Запрос на поиск документов
message SearchRequest {
  string query = 1;
  int32 limit = 2;
  float similarity_threshold = 3;
  ComparisonMethod comparison_method = 4;
}

// Ответ на поиск документов
message SearchResponse {
  repeated DocumentResult results = 1;
  int32 total_found = 2;
}

// Результат поиска документа
message DocumentResult {
  string id = 1;
  string title = 2;
  string content = 3;
  float similarity_score = 4;
  map<string, string> metadata = 5;
}

// Запрос на получение документа
message GetDocumentRequest {
  string id = 1;
}

// Ответ с документом
message GetDocumentResponse {
  DocumentResult document = 1;
  bool found = 2;
}

// Запрос на удаление документа
message DeleteDocumentRequest {
  string id = 1;
}

// Ответ на удаление документа
message DeleteDocumentResponse {
  bool success = 1;
  string message = 2;
}

// Запрос статистики индекса
message GetIndexStatsRequest {}

// Ответ со статистикой индекса
message GetIndexStatsResponse {
  int32 total_documents = 1;
  int64 index_size_bytes = 2;
  string last_updated = 3;
}

// Запрос на получение настроек RAG
message GetRagSettingsRequest {}

// Ответ с настройками RAG
message GetRagSettingsResponse {
  map<string, string> settings = 1;
}

// Запрос на обновление настройки RAG
message UpdateRagSettingsRequest {
  string key = 1;
  string value = 2;
  string changed_by = 3;
}

// Ответ на обновление настройки
message UpdateRagSettingsResponse {
  bool success = 1;
  string message = 2;
}

// Запрос на получение истории настроек
message GetRagSettingsHistoryRequest {
  int32 limit = 1;
}

// Ответ с историей настроек
message GetRagSettingsHistoryResponse {
  repeated SettingsHistoryEntry entries = 1;
}

// Запись истории изменения настройки
message SettingsHistoryEntry {
  int32 id = 1;
  string setting_key = 2;
  string old_value = 3;
  string new_value = 4;
  string changed_by = 5;
  string changed_at = 6;
} 
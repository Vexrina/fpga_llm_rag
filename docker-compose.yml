version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rag_postgres
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./rag/migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fpga-network

  migrate:
    image: migrate/migrate:latest
    container_name: rag_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rag_user:rag_password@postgres:5432/rag_db?sslmode=disable
    volumes:
      - ./rag/migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://rag_user:rag_password@postgres:5432/rag_db?sslmode=disable", "up"]
    networks:
      - fpga-network

  float-weaver:
    build: ./float-weaver
    container_name: float-weaver
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBEDDING_MODEL=bge-m3
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - fpga-network

  rag:
    build: ./rag
    container_name: rag_service
    depends_on:
      migrate:
        condition: service_completed_successfully
      float-weaver:
        condition: service_started
    environment:
      PORT: 50051
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_db
      FLOATWEAVER_HOST: float-weaver
      FLOATWEAVER_PORT: 8081
    ports:
      - "50051:50051"
    volumes:
      - ./rag/migrations:/app/migrations
      - ./rag/python_scripts:/app/python_scripts
    networks:
      - fpga-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/init.sh:/init.sh
    environment:
      - OLLAMA_HOST=0.0.0.0
    entrypoint: ["/bin/bash", "/init.sh"]
    networks:
      - fpga-network

  llm-gateway:
    build: ./llm-gateway
    container_name: llm-gateway
    depends_on:
      rag:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      PORT: 8083
      RAG_HOST: rag
      RAG_PORT: 50051
      OLLAMA_URL: ollama:11434
      OLLAMA_MODEL: llama3
    ports:
      - "8083:8083"
    networks:
      - fpga-network

  graphql-gateway:
    build: ./graphql-gateway
    container_name: graphql-gateway
    depends_on:
      llm-gateway:
        condition: service_started
      rag:
        condition: service_started
    environment:
      LLM_GATEWAY_ADDR: llm-gateway:8083
      RAG_SERVICE_ADDR: rag:50051
      FLOAT_WEAVER_ADDR: float-weaver:8081
      GRAPHQL_PORT: 8080
    ports:
      - "4000:8080"
    networks:
      - fpga-network

volumes:
  postgres_data:
  ollama_data:

networks:
  fpga-network:
    driver: bridge

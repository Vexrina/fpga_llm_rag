version: '3.8'

services:
  graphql-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LLM_GATEWAY_ADDR=llm-gateway:8083
      - RAG_SERVICE_ADDR=rag:50051
      - FLOAT_WEAVER_ADDR=float-weaver:8081
      - GRAPHQL_PORT=8080
    depends_on:
      - llm-gateway
      - rag
      - float-weaver
    networks:
      - fpga-network

networks:
  fpga-network:
    external: true
